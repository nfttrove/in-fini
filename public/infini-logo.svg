  <text x="200" y="78" fontFamily="'Segoe UI', Roboto, Helvetica, sans-serif" fontSize="44" fontWeight="700" fill="url(#mainGrad)" letterSpacing="2">In</text>
  <text x="268" y="78" fontFamily="'Segoe UI', Roboto, Helvetica, sans-serif" fontSize="44" fontWeight="300" fill="url(#finiGrad)" letterSpacing="1">Fini</text>

