    <line x1="68" y1="-28" x2="68" y2="32" stroke="url(#finiGrad)" strokeWidth="6" strokeLinecap="round"/>
    <rect x="72" y="-38" width="24" height="20" rx="2" fill="url(#finiGrad)"/>
    <g fill="white" opacity="0.8">
      <rect x="74" y="-36" width="4" height="4"/>
      <rect x="82" y="-36" width="4" height="4"/>
      <rect x="90" y="-36" width="4" height="4"/>
      <rect x="78" y="-32" width="4" height="4"/>
      <rect x="86" y="-32" width="4" height="4"/>
      <rect x="74" y="-28" width="4" height="4"/>
      <rect x="82" y="-28" width="4" height="4"/>
      <rect x="90" y="-28" width="4" height="4"/>
